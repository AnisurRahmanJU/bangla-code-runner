<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>আঁকার বোর্ড - প্রো</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Baloo+Da+2&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; touch-action: none; }
    body, html {
      margin: 0; padding: 0;
      font-family: 'Hind Siliguri', sans-serif;
      background-color: #001f3f;
      color: white; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    
    /* ===== App Header Style ===== */
.app-header {
  width: 100%;
  background: #0f172a;
  padding: 10px 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.app-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-logo {
  background: #22c55e;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: #000;
}

.app-title {
  font-size: 18px;
  font-weight: 600;
}

.app-pro {
  color: #38bdf8;
  font-size: 12px;
  margin-left: 4px;
}

    #drawingCanvas {
      flex: 1; background-color: #001f3f;
      cursor: crosshair; display: block;
    }

    #footer {
      background-color: #0d2b52; padding: 15px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      border-top: 1px solid #1e293b;
    }

    .color-palette {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 8px;
    }

    .color-dot {
      width: 25px; height: 25px;
      border-radius: 50%; border: 2px solid #fff;
      cursor: pointer; transition: 0.2s;
    }

    .color-dot.active { transform: scale(1.3); border-color: #ffde59; }

    .btn-group .btn { border-radius: 20px; padding: 5px 15px; font-size: 14px; }
  </style>
</head>
<body>

<div class="app-header" id="header">
  <div d-flex align-items-center>
    <div class="app-left" style="display:flex; align-items:center;">
        <div class="app-logo">&lt;/&gt;</div>
        <div class="app-title">বাংলা কোড রানার <span style="color:#38bdf8">PRO</span></div>
    </div>
  </div>
  <div style="font-size:20px;">🎨</div>
</div>

<canvas id="drawingCanvas"></canvas>

<div id="footer">
  <div class="color-palette" id="palette">
    <div class="color-dot" style="background: white;" onclick="setColor('white', this)"></div>
    <div class="color-dot" style="background: red;" onclick="setColor('red', this)"></div>
    <div class="color-dot" style="background: green;" onclick="setColor('green', this)"></div>
    <div class="color-dot" style="background: blue;" onclick="setColor('blue', this)"></div>
    <div class="color-dot" style="background: yellow;" onclick="setColor('yellow', this)"></div>
    <div class="color-dot" style="background: cyan;" onclick="setColor('cyan', this)"></div>
    <div class="color-dot" style="background: orange;" onclick="setColor('orange', this)"></div>
    <div class="color-dot" style="background: #e11d48;" onclick="setColor('#e11d48', this)"></div>
    <div class="color-dot" style="background: #22c55e;" onclick="setColor('#22c55e', this)"></div>
    <div class="color-dot" style="background: gray;" onclick="setColor('gray', this)"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-success" onclick="promptAndSave()">সংরক্ষণ</button>
    <button class="btn btn-warning" onclick="clearBoard()">পরিষ্কার</button>
    <button class="btn btn-danger" onclick="window.location.reload()">রিসেট</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('drawingCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let currentColor = 'white';

  function resizeCanvas() {
    // ক্যানভাসের সাইজ উইন্ডোর সাথে এডজাস্ট করা
    const headerHeight = document.getElementById('header').offsetHeight;
    const footerHeight = document.getElementById('footer').offsetHeight;
    
    // ক্যানভাসের ইন্টারনাল রেজোলিউশন সেট করা
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - headerHeight - footerHeight;

    // ব্যাকগ্রাউন্ড আবার ফিল করা (রিসাইজ করলে ক্যানভাস মুছে যায়)
    ctx.fillStyle = '#001f3f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  window.addEventListener('load', () => {
    resizeCanvas();
    document.querySelector('.color-dot').classList.add('active');
  });

  function setColor(color, element) {
    currentColor = color;
    document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function draw(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = currentColor;
    
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }

  function stopDraw() {
    drawing = false;
  }

  // মাউস ইভেন্ট
  canvas.addEventListener('mousedown', startDraw);
  window.addEventListener('mousemove', draw);
  window.addEventListener('mouseup', stopDraw);

  // টাচ ইভেন্ট (স্মার্টফোন)
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', stopDraw, { passive: false });

  function clearBoard() {
    ctx.fillStyle = '#001f3f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function promptAndSave() {
    let filename = prompt('ফাইলের নাম লিখুন:', 'my_drawing.png');
    if (!filename) return;
    const link = document.createElement('a');
    link.download = filename.endsWith('.png') ? filename : filename + '.png';
    link.href = canvas.toDataURL();
    link.click();
  }
</script>

</body>
</html>
