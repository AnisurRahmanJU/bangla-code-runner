<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Examples</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#0d1117;
color:white;
}

.topic{
margin-top:40px;
border-bottom:1px solid #444;
padding-bottom:10px;
}

pre{
position:relative;
background:#161b22;
padding:15px;
border-radius:6px;
overflow:auto;
}

.copy-btn{
position:absolute;
top:5px;
right:5px;
background:#238636;
border:none;
color:white;
padding:5px 10px;
cursor:pointer;
border-radius:4px;
}
</style>

</head>

<body>

<h1>Examples</h1>
<div id="content"></div>

<script>

const user="AnisurrahmanJU";
const repo="bangla-code-runner";

async function loadExamples(){

let res=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/examples`);
let folders=await res.json();

for(let folder of folders){

if(folder.type==="dir"){

let topic=document.createElement("h2");
topic.className="topic";
topic.textContent=folder.name;
content.appendChild(topic);

let res2=await fetch(folder.url);
let files=await res2.json();

for(let file of files){

if(file.name.endsWith(".md")){

let md=await fetch(file.download_url);
let text=await md.text();

let html=marked.parse(text);

let div=document.createElement("div");
div.innerHTML=html;

content.appendChild(div);

}

}

}

}

setTimeout(addCopyButtons,500);

}

function addCopyButtons(){

document.querySelectorAll("pre code").forEach(block=>{

hljs.highlightElement(block);

let btn=document.createElement("button");
btn.textContent="Copy";
btn.className="copy-btn";

btn.onclick=()=>{
navigator.clipboard.writeText(block.innerText);
btn.textContent="Copied!";
setTimeout(()=>btn.textContent="Copy",1000);
};

block.parentElement.appendChild(btn);

});

}

loadExamples();

</script>

</body>
</html>
