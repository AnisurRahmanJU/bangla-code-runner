<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলা কোড রানার</title>

    <link href='https://fonts.googleapis.com/css?family=Hind Siliguri' rel='stylesheet'/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-palenight.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="styles.css"/>

    <style>
        .sidebar {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .file-upload-box {
            margin-top: auto; 
            margin-bottom: 10px;
        }

        /* --- বাটনগুলোকে বড় এবং সমান সাইজ করার জন্য স্টাইল --- */
        .btn-ide {
            height: 40px; /* উচ্চতা বাড়ানো হয়েছে */
            min-width: 120px; /* সব বাটনের সর্বনিম্ন প্রস্থ সমান করা হয়েছে */
            padding: 0 20px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-run { background: #238636; color: white; }
        .btn-run:hover { background: #2ea043; }
        
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #bb2d3b; }

        .btn-reload { background: #0366d6; color: white; }
        .btn-reload:hover { background: #0b78e3; }

        .btn-toggle { 
            background: transparent; 
            color: #8b949e; 
            border: 1px solid #30363d; 
            min-width: 40px; /* টগল বাটনের জন্য আলাদা প্রস্থ */
            width: 40px;
        }

        .action-container {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="d-flex align-items-center">
        <img src="logo.png" width="25" class="me-2">
        <h5 class="mb-0">বাংলা কোড রানার <span style="font-size: 11px; color: #38bdf8;">PRO</span></h5>
    </div>
    
    <div class="d-flex align-items-center">
        <div class="action-icons me-3">
            <i class="fa-regular fa-copy" onclick="copyContent()" title="কপি করুন"></i>
            <i class="fa-solid fa-download" onclick="downloadContent()" title="ডাউনলোড করুন"></i>
        </div>
        <div class="action-container">
            <button class="btn-ide btn-danger" onclick="clearCode()">🗑 কোড মুছুন</button>
            <button id="runBtn" class="btn-ide btn-run" onclick="runBanglaCode()">▶ রান করুন</button>
        </div>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <h3 class="sidebar-title">প্রজেক্ট ফাইল</h3>
        
        <div>
            <label class="mt-3" style="font-size: 12px; color: #64748b;">ফাইলের নাম:</label>
            <input type="text" id="fileName" class="filename-input" value="main.bcr">
        </div>

        
        <div class="github-link" onclick="window.open('https://github.com/AnisurRahmanJU/bangla-code-runner/blob/main/docs/ডকুমেন্টেশন.md', '_blank')">
            🔗 ডকুমেন্টশন
        </div>
        <div class="github-link" onclick="window.open('https://github.com/AnisurRahmanJU/bangla-code-runner/tree/main/examples', '_blank')">
            🔗 উদাহরণ
        </div>
        <div class="github-link" onclick="window.open('https://github.com/AnisurRahmanJU/bangla-code-runner', '_blank')">
            🔗 গিটহাব লিঙ্ক
        </div>

        <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-file-import"></i> ফাইল আপলোড (.bcr)
        </div>
        <input type="file" id="fileInput" accept=".bcr,.txt" style="display:none" onchange="handleFileUpload(event)">
    </div>

    <div class="main">
        <div id="editorSection">
            <textarea id="banglaCode">
// Input
ধরি নাম = ইনপুট("তোমার নাম কি?")

// Condition
যদি (নাম == "আনিছুর") {
    দেখাও("হ্যালো আনিছুর");
} নাহলে যদি (নাম == "লিখন") {
    দেখাও("হ্যালো লিখন");
} নাহলে {
    দেখাও("ঘোড়ার ডিম! তোমার নাম কি?");
}
            </textarea>
        </div>

        <div id="resizer"></div>

        <div id="consoleSection">
            <div class="console-header">
                <span style="font-size: 13px; color: #8b949e;">আউটপুট টার্মিনাল</span>
                <div class="action-container">
                    <button class="btn-ide btn-danger" onclick="clearOutput()">🗑 মুছুন</button>
                    <button class="btn-ide btn-reload" onclick="location.reload()">↺ রিলোড</button>
                    <button id="maxToggleBtn" class="btn-ide btn-toggle"><i class="fa-solid fa-chevron-up"></i></button>
                </div>
            </div>
            <div class="console-output" id="output"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
<script src="parser.js"></script>

<script>
    function toBN(text) {
        const engToBn = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
        return text.toString().replace(/[0-9]/g, d => engToBn[d]);
    }

    const customOverlay = {
        token: function(stream) {
            if (stream.match(/^\/\/.*/)) return "comment-custom";
            if (stream.match(/^"(?:[^"\\]|\\.)*"/) || stream.match(/^'(?:[^'\\]|\\.)*'/)) return "string";
            if (stream.match(/^(ধরি|চলক|ধ্রুবক|যদি|নাহলে যদি|নাহলে|সত্য|মিথ্যা|এবং|অথবা|ফেরত|নাল|সুইচ|কেস|ডিফল্ট|লুপ|যতক্ষণ|করো|থামো|বাদ|মধ্যে|ফাংশন|স্ট্রাক্ট|গণিত)(?![\u0980-\u09FF\w])/)) return "keyword-custom";
            if (stream.match(/^([\u0980-\u09FF\w_]+)\s*\(/)) return "func-call";
            if (stream.match(/^\.[\u0980-\u09FF\w]+/)) {
                const current = stream.current();
                stream.backUp(current.length - 1);
                stream.next();
                stream.eatWhile(/[\u0980-\u09FF\w]/);
                return "dotname";
            }
            if (stream.match(/^[০-৯]+(\.[০-৯]+)?/)) return "bangla-number";
            stream.next();
            return null;
        }
    };

    const editor = CodeMirror.fromTextArea(document.getElementById('banglaCode'), {
        mode: { name: 'python' },
        theme: 'material-palenight',
        lineNumbers: true,
        indentUnit: 4,
        lineNumberFormatter: line => toBN(line)
    });
    editor.addOverlay(customOverlay);

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            editor.setValue(e.target.result);
            document.getElementById('fileName').value = file.name;
        };
        reader.readAsText(file);
    }

    function runBanglaCode() {
        const outDiv = document.getElementById('output');
        outDiv.innerHTML = '';
        try {
            if (typeof banglaToJS === "function") {
                const jsCode = banglaToJS(editor.getValue());
                new Function(jsCode)();
            } else {
                outDiv.innerHTML = '<span style="color:orange">সতর্কতা: parser.js পাওয়া যায়নি!</span>';
            }
        } catch (e) {
            outDiv.innerHTML = `<span style="color:#ff3344">ত্রুটি: ${toBN(e.message)}</span>`;
        }
    }

    (function() {
        const outputDiv = document.getElementById('output');
        console.log = function(...args) {
            args.forEach(arg => {
                outputDiv.innerHTML += `<span>${toBN(arg)}</span>\n`;
            });
            outputDiv.scrollTop = outputDiv.scrollHeight;
        };
    })();

    function copyContent() {
        navigator.clipboard.writeText(editor.getValue()).then(() => alert("কোড কপি করা হয়েছে!"));
    }

    function downloadContent() {
        const code = editor.getValue();
        const fileName = document.getElementById('fileName').value || 'main.bcr';
        const blob = new Blob([code], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }

    function clearCode() {
        if(confirm("আপনি কি নিশ্চিতভাবে সব কোড মুছতে চান?")) {
            editor.setValue('');
        }
    }

    function clearOutput() { document.getElementById('output').innerHTML = ''; }

    const resizer = document.getElementById('resizer');
    const consoleSection = document.getElementById('consoleSection');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => isResizing = true);
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const h = window.innerHeight - e.clientY;
        if (h > 40 && h < window.innerHeight - 100) {
            consoleSection.style.height = h + 'px';
            editor.refresh();
        }
    });
    document.addEventListener('mouseup', () => isResizing = false);

    document.getElementById('maxToggleBtn').onclick = function() {
        consoleSection.classList.toggle('maximized');
        editor.refresh();
    };
</script> 
</body>
</html>
