<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>

<script>
    function toBN(text) {
        const engToBn = { '0': 'аІ¶', '1': 'аІІ', '2': 'аІ®', '3': 'аІ©', '4': 'аІ™', '5': 'аІЂ', '6': 'аІђ', '7': 'аІ≠', '8': 'аІЃ', '9': 'аІѓ' };
        return text.toString().replace(/[0-9]/g, d => engToBn[d]);
    }

    const customOverlay = {
        token: function(stream) {
            if (stream.match(/^\/\/.*/)) return "comment-custom";
            if (stream.match(/^"(?:[^"\\]|\\.)*"/) || stream.match(/^'(?:[^'\\]|\\.)*'/)) return "string";
            if (stream.match(/^(а¶Іа¶∞а¶њ|а¶Ъа¶≤а¶Х|а¶ІаІНа¶∞аІБа¶ђа¶Х|а¶ѓа¶¶а¶њ|а¶®а¶Ња¶єа¶≤аІЗ а¶ѓа¶¶а¶њ|а¶®а¶Ња¶єа¶≤аІЗ|а¶Єа¶§аІНа¶ѓ|а¶Ѓа¶ња¶•аІНа¶ѓа¶Њ|а¶Па¶ђа¶В|а¶Еа¶•а¶ђа¶Њ|а¶ЂаІЗа¶∞а¶§|а¶®а¶Ња¶≤|а¶ЄаІБа¶За¶Ъ|а¶ХаІЗа¶Є|а¶°а¶ња¶Ђа¶≤аІНа¶Я|а¶≤аІБа¶™|а¶ѓа¶§а¶ХаІНа¶Ја¶£|а¶Ха¶∞аІЛ|а¶•а¶Ња¶ЃаІЛ|а¶ђа¶Ња¶¶|а¶Ѓа¶ІаІНа¶ѓаІЗ|а¶Ђа¶Ња¶Ва¶ґа¶®|а¶ЄаІНа¶ЯаІНа¶∞а¶Ња¶ХаІНа¶Я|а¶Ча¶£а¶ња¶§)(?![\u0980-\u09FF\w])/)) return "keyword-custom";
            if (stream.match(/^([\u0980-\u09FF\w_]+)\s*\(/)) return "func-call";
            if (stream.match(/^\.[\u0980-\u09FF\w]+/)) {
                const current = stream.current();
                stream.backUp(current.length - 1);
                stream.next();
                stream.eatWhile(/[\u0980-\u09FF\w]/);
                return "dotname";
            }
            if (stream.match(/^[аІ¶-аІѓ]+(\.[аІ¶-аІѓ]+)?/)) return "bangla-number";
            stream.next();
            return null;
        }
    };

    const editor = CodeMirror.fromTextArea(document.getElementById('banglaCode'), {
        mode: { name: 'python' },
        theme: 'material-palenight',
        lineNumbers: true,
        indentUnit: 4,
        lineNumberFormatter: line => toBN(line)
    });
    editor.addOverlay(customOverlay);

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            editor.setValue(e.target.result);
            document.getElementById('fileName').value = file.name;
        };
        reader.readAsText(file);
    }

    function runBanglaCode() {
        const outDiv = document.getElementById('output');
        outDiv.innerHTML = '';
        try {
            if (typeof banglaToJS === "function") {
                const jsCode = banglaToJS(editor.getValue());
                new Function(jsCode)();
            } else {
                outDiv.innerHTML = '<span style="color:orange">а¶Єа¶§а¶∞аІНа¶Ха¶§а¶Њ: parser.js а¶™а¶Ња¶Уа¶ѓа¶Ља¶Њ а¶ѓа¶Ња¶ѓа¶Ља¶®а¶њ!</span>';
            }
        } catch (e) {
            outDiv.innerHTML = `<span style="color:#ff3344">а¶§аІНа¶∞аІБа¶Яа¶њ: ${toBN(e.message)}</span>`;
        }
    }

    (function() {
        const outputDiv = document.getElementById('output');
        console.log = function(...args) {
            args.forEach(arg => {
                outputDiv.innerHTML += `<span>${toBN(arg)}</span>\n`;
            });
            outputDiv.scrollTop = outputDiv.scrollHeight;
        };
    })();

    function copyContent() {
        navigator.clipboard.writeText(editor.getValue()).then(() => alert("а¶ХаІЛа¶° а¶Ха¶™а¶њ а¶Ха¶∞а¶Њ а¶єа¶ѓа¶ЉаІЗа¶ЫаІЗ!"));
    }

    function downloadContent() {
        const code = editor.getValue();
        const fileName = document.getElementById('fileName').value || 'main.bcr';
        const blob = new Blob([code], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }

    function clearCode() {
        if(confirm("а¶Жа¶™а¶®а¶њ а¶Ха¶њ а¶®а¶ња¶ґаІНа¶Ъа¶ња¶§а¶≠а¶Ња¶ђаІЗ а¶Єа¶ђ а¶ХаІЛа¶° а¶ЃаІБа¶Ыа¶§аІЗ а¶Ъа¶Ња¶®?")) {
            editor.setValue('');
        }
    }

    function clearOutput() { document.getElementById('output').innerHTML = ''; }

    const resizer = document.getElementById('resizer');
    const consoleSection = document.getElementById('consoleSection');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => isResizing = true);
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const h = window.innerHeight - e.clientY;
        if (h > 40 && h < window.innerHeight - 100) {
            consoleSection.style.height = h + 'px';
            editor.refresh();
        }
    });
    document.addEventListener('mouseup', () => isResizing = false);

    document.getElementById('maxToggleBtn').onclick = function() {
        consoleSection.classList.toggle('maximized');
        editor.refresh();
    };
</script>
